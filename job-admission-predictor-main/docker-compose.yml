services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: job-admission-backend
    environment:
      PORT: 5000
      SECRET_KEY: ${SECRET_KEY:-your_super_secret_jwt_key_change_this_in_production_12345}
      MONGO_URI: ${MONGO_URI:-mongodb://host.docker.internal:27017/job_admission_db}
      FLASK_ENV: ${FLASK_ENV:-production}
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
        VITE_APP_NAME: ${VITE_APP_NAME:-PredictGenius}
    container_name: job-admission-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
